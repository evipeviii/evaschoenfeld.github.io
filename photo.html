<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info – Eva Schönfeld</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Raleway', sans-serif;
            background: white;
            color: black;
        }
        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .name {
            font-size: 24px;
            letter-spacing: 2px;
            text-decoration: none;
            color: black;
            font-weight: 600;
        }
        .nav-rechts {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        nav {
            display: flex;
            gap: 25px;
        }
        nav a {
            text-decoration: none;
            color: black;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: 400;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .social {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .social a {
            color: black;
            font-size: 18px;
            text-decoration: none;
        }
        .social a:hover {
            opacity: 0.6;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: black;
        }
        .nav-mobile {
            display: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px 20px 30px 20px;
            background: white;
        }
        .nav-mobile a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            letter-spacing: 1px;
            font-weight: 400;
        }
        .nav-mobile .social-mobile {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .nav-mobile .social-mobile a {
            font-size: 22px;
            color: black;
        }
        .nav-mobile.offen {
            display: flex;
        }
        .inhalt {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 50px 80px 50px;
        }
        .inhalt h1 {
            font-size: 13px;
            letter-spacing: 2px;
            font-weight: 400;
            margin-bottom: 50px;
            text-transform: lowercase;
        }
        .spalten {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }
        .abschnitt {
            margin-bottom: 50px;
        }
        .abschnitt h2 {
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 400;
            text-transform: lowercase;
            margin-bottom: 20px;
            color: #666;
        }
        .abschnitt p {
            font-size: 14px;
            font-weight: 300;
            line-height: 2;
        }
        .abschnitt strong {
            font-weight: 600;
        }
        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            nav { display: none; }
            .social { display: none; }
            .hamburger { display: flex; }
            .inhalt { padding: 30px 20px 60px 20px; }
            .spalten {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a class="name" href="index.html">Eva Schönfeld</a>
        <div class="nav-rechts">
            <nav>
                <a href="artworks.html">artworks</a>
                <a href="info.html">info</a>
                <a href="contact.html">contact</a>
                <a href="photo.html">photo</a>
            </nav>
            <div class="social">
                <a href="https://www.instagram.com/evillu_s/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://t.me/eviskunst" target="_blank"><i class="fab fa-telegram"></i></a>
            </div>
        </div>
        <button class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>
    <div class="nav-mobile" id="navMobile">
        <a href="artworks.html">artworks</a>
        <a href="info.html">info</a>
        <a href="contact.html">contact</a>
        <a href="photo.html">photo</a>
        <div class="social-mobile">
            <a href="https://www.instagram.com/evillu_s/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/eviskunst" target="_blank"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <div class="inhalt">
        <div class="spalten">
            <div class="links">
                <div class="abschnitt">
                    <h2>This site is under construction.  </h2>
                    <p>
                        Aber bald gibt es hier Reportagefotos. <br>
                        Bis dahin schaut gern auf mein Profil bei flickr:<br><br>
                        <a href="https://www.flickr.com/photos/evaschoenfeld/" target="_blank">Eva Schönfeld Fotografie</a>
                         <br><br>
                         oder auf meinem Fotografie-Blog: 
                        <a href="http://evaschoenfeldfotografie.blogspot.com" target="_blank">Foto-Blog</a>
                        
                    </p>
                </div>
            </div>
            <div class="rechts">
                <div class="abschnitt">
                    
                </div>
                <div class="abschnitt">
                    
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('navMobile');
            nav.classList.toggle('offen');
        }
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
