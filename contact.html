<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Eva Schönfeld</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Raleway', sans-serif;
            background: white;
            color: black;
        }
        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .name {
            font-size: 24px;
            letter-spacing: 2px;
            text-decoration: none;
            color: black;
            font-weight: 600;
        }
        .nav-rechts {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        nav {
            display: flex;
            gap: 25px;
        }
        nav a {
            text-decoration: none;
            color: black;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: 400;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .social {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .social a {
            color: black;
            font-size: 18px;
            text-decoration: none;
        }
        .social a:hover {
            opacity: 0.6;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: black;
        }
        .nav-mobile {
            display: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px 20px 30px 20px;
            background: white;
        }
        .nav-mobile a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            letter-spacing: 1px;
            font-weight: 400;
        }
        .nav-mobile .social-mobile {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .nav-mobile .social-mobile a {
            font-size: 22px;
            color: black;
        }
        .nav-mobile.offen {
            display: flex;
        }
        .inhalt {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 50px 80px 50px;
        }
        .spalten {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }
        .abschnitt {
            margin-bottom: 40px;
        }
        .abschnitt h2 {
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 400;
            text-transform: lowercase;
            margin-bottom: 20px;
            color: #666;
        }
        .abschnitt p {
            font-size: 14px;
            font-weight: 300;
            line-height: 2;
        }
        .newsletter-link {
            display: inline-block;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            color: black;
            text-decoration: none;
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
        }
        .newsletter-link:hover {
            opacity: 0.6;
        }

        /* Formular */
        .kontaktformular h2 {
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 400;
            text-transform: lowercase;
            margin-bottom: 20px;
            color: #666;
        }
        .kontaktformular input,
        .kontaktformular textarea {
            width: 100%;
            font-family: 'Raleway', sans-serif;
            font-size: 14px;
            font-weight: 300;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 8px 0;
            margin-bottom: 25px;
            outline: none;
            background: transparent;
        }
        .kontaktformular textarea {
            height: 120px;
            resize: none;
        }
        .kontaktformular button {
            font-family: 'Raleway', sans-serif;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            background: transparent;
            color: black;
            border: none;
            padding: 0;
            cursor: pointer;
        }
        .kontaktformular button:hover {
            opacity: 0.6;
        }

        /* Fade */
        .kontaktformular form {
            transition: opacity 0.4s ease;
        }
        .kontaktformular form.ausblenden {
            opacity: 0;
        }
        .erfolgsmeldung {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            font-size: 14px;
            font-weight: 300;
            line-height: 2;
            color: black;
        }
        .erfolgsmeldung.einblenden {
            display: block;
            opacity: 1;
        }

        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            nav { display: none; }
            .social { display: none; }
            .hamburger { display: flex; }
            .inhalt { padding: 30px 20px 60px 20px; }
            .spalten {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a class="name" href="index.html">Eva Schönfeld</a>
        <div class="nav-rechts">
            <nav>
                <a href="artworks.html">artworks</a>
                <a href="info.html">info</a>
                <a href="contact.html">contact</a>
                <a href="photo.html">photo</a>
                <a href="newsletter.html" style="color: #999;">newsletter</a>
            </nav>
            <div class="social">
                <a href="https://www.instagram.com/evillu_s/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://t.me/eviskunst" target="_blank"><i class="fab fa-telegram"></i></a>
            </div>
        </div>
        <button class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>
    <div class="nav-mobile" id="navMobile">
        <a href="artworks.html">artworks</a>
        <a href="info.html">info</a>
        <a href="contact.html">contact</a>
        <a href="photo.html">photo</a>
        <a href="newsletter.html" style="color: #999;">newsletter</a>
        <div class="social-mobile">
            <a href="https://www.instagram.com/evillu_s/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/eviskunst" target="_blank"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <div class="inhalt">
        <div class="spalten">
            <div class="links">
                <div class="abschnitt">
                    <h2>atelier</h2>
                    <p>
                        Eva Schönfeld<br>
                        Binzstraße 58<br>
                        13189 Berlin
                    </p>
                </div>
                <div class="abschnitt">
                    <h2>newsletter</h2>
                    <a href="newsletter.html" class="newsletter-link">newsletter abonnieren →</a>
                </div>
            </div>
            <div class="rechts">
                <div class="kontaktformular">
                    <h2>nachricht schreiben</h2>
                    <form id="kontaktform" action="https://formspree.io/f/mrevyrkl" method="POST">
                        <input type="text" name="name" placeholder="Name" required>
                        <input type="email" name="email" placeholder="E-Mail" required>
                        <textarea name="nachricht" placeholder="Nachricht" required></textarea>
                        <button type="submit">senden →</button>
                    </form>
                    <div class="erfolgsmeldung" id="erfolgsmeldung">
                        Danke für die Nachricht und Ihr Interesse.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('navMobile');
            nav.classList.toggle('offen');
        }

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        const form = document.getElementById('kontaktform');
        const erfolgsmeldung = document.getElementById('erfolgsmeldung');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = new FormData(form);
            const response = await fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            });
            if (response.ok) {
                form.classList.add('ausblenden');
                setTimeout(() => {
                    form.style.display = 'none';
                    erfolgsmeldung.style.display = 'block';
                    setTimeout(() => {
                        erfolgsmeldung.classList.add('einblenden');
                    }, 10);
                }, 400);
            }
        });
    </script>
</body>
</html>
