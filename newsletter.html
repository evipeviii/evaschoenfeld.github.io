<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter – Eva Schönfeld</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Raleway', sans-serif;
            background: white;
            color: black;
        }
        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .name {
            font-size: 24px;
            letter-spacing: 2px;
            text-decoration: none;
            color: black;
            font-weight: 600;
        }
        .nav-rechts {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        nav {
            display: flex;
            gap: 25px;
        }
        nav a {
            text-decoration: none;
            color: black;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: 400;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .social {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .social a {
            color: black;
            font-size: 18px;
            text-decoration: none;
        }
        .social a:hover {
            opacity: 0.6;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: black;
        }
        .nav-mobile {
            display: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px 20px 30px 20px;
            background: white;
        }
        .nav-mobile a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            letter-spacing: 1px;
            font-weight: 400;
        }
        .nav-mobile .social-mobile {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .nav-mobile .social-mobile a {
            font-size: 22px;
            color: black;
        }
        .nav-mobile.offen {
            display: flex;
        }
        .inhalt {
            max-width: 540px;
            margin: 0 auto;
            padding: 60px 50px 80px 50px;
        }
        .sib-form {
            background-color: white !important;
        }
        #sib-container {
            border: none !important;
            background-color: white !important;
        }
        .sib-form-block__button {
            font-family: 'Raleway', sans-serif !important;
            letter-spacing: 2px !important;
            border-radius: 0 !important;
        }
        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            nav { display: none; }
            .social { display: none; }
            .hamburger { display: flex; }
            .inhalt { padding: 30px 20px 60px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <a class="name" href="index.html">Eva Schönfeld</a>
        <div class="nav-rechts">
            <nav>
                <a href="artworks.html">artworks</a>
                <a href="info.html">info</a>
                <a href="contact.html">contact</a>
                <a href="photo.html">photo</a>
                <a href="newsletter.html" style="color: #999;">newsletter</a>
            </nav>
            <div class="social">
                <a href="https://www.instagram.com/evillu_s/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://t.me/eviskunst" target="_blank"><i class="fab fa-telegram"></i></a>
            </div>
        </div>
        <button class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>
    <div class="nav-mobile" id="navMobile">
        <a href="artworks.html">artworks</a>
        <a href="info.html">info</a>
        <a href="contact.html">contact</a>
        <a href="photo.html">photo</a>
        <a href="newsletter.html" style="color: #999;">newsletter</a>
        <div class="social-mobile">
            <a href="https://www.instagram.com/evillu_s/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/eviskunst" target="_blank"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <div class="inhalt">
        <style>
            #sib-container input::placeholder {
                font-family: Trebuchet MS, sans-serif;
                text-align: left;
                color: #c0ccda;
            }
            #sib-container a {
                text-decoration: underline;
                color: #0a0a0a;
            }
        </style>

        <div class="sib-form" style="text-align: center; background-color: #ffffff;">
            <div id="sib-form-container" class="sib-form-container">
                <div id="error-message" class="sib-form-message-panel" style="font-family:Helvetica, sans-serif; font-size:16px; text-align:left; color:#661d1d; background-color:#ffeded; border-color:#ff4949; border-radius:3px; max-width:540px;">
                    <div class="sib-form-message-panel__text sib-form-message-panel__text--center">
                        <span class="sib-form-message-panel__inner-text">Deine Anmeldung konnte nicht gespeichert werden. Bitte versuche es erneut.</span>
                    </div>
                </div>
                <div id="success-message" class="sib-form-message-panel" style="font-family:Helvetica, sans-serif; font-size:16px; text-align:left; color:#085229; background-color:#e7faf0; border-color:#13ce66; border-radius:3px; max-width:540px;">
                    <div class="sib-form-message-panel__text sib-form-message-panel__text--center">
                        <span class="sib-form-message-panel__inner-text">Deine Anmeldung war erfolgreich.</span>
                    </div>
                </div>
                <div id="sib-container" class="sib-container--large sib-container--vertical" style="max-width:540px; text-align:center; background-color:rgba(255,255,255,1); border-width:0px; direction:ltr">
                    <form id="sib-form" method="POST" action="https://f0aade30.sibforms.com/serve/MUIFAKz0TeOKqk2BVlqWy30MhflMioO5Cvvo-rgCOltms4kf8VCGvAQ1dkBWxdT2aF5IAYP6ThMxzgFCvJOBD3A1Z8t_VEe7j_0WxvBtdw4h0dmbGrL0-zFWXGT8Df2yHm5lZpNNd3BzlgWS2ARXERNITwLXT4XfG9s4VnslGFqazqdr-eiRrK7roIjuJe8p4RjmoRDIDnuvdp3c_A==" data-type="subscription">
                        <div style="padding: 8px 0;">
                            <div class="sib-form-block" style="font-family:'Raleway', sans-serif; font-size:11px; text-align:left; color:#666; background-color:transparent; letter-spacing:2px;">
                                <p>newsletter</p>
                            </div>
                        </div>
                        <div style="padding: 8px 0;">
                            <div class="sib-form-block" style="font-family:'Raleway', sans-serif; font-size:14px; text-align:left; color:#000000; background-color:transparent;">
                                <div class="sib-text-form-block">
                                    <p>Erhalte Einladungen zu Ausstellungen, Vernissagen und Neuigkeiten aus meinem Atelier.</p>
                                </div>
                            </div>
                        </div>
                        <div style="padding: 8px 0;">
                            <div class="sib-input sib-form-block">
                                <div class="form__entry entry_block">
                                    <div class="form__label-row">
                                        <div class="entry__field">
                                            <input class="input" type="text" id="EMAIL" name="EMAIL" autocomplete="off" value="" placeholder="E-Mail-Adresse" data-required="true" required />
                                        </div>
                                    </div>
                                    <label class="entry__error entry__error--primary" style="font-family:Helvetica, sans-serif; font-size:16px; text-align:left; color:#661d1d; background-color:#ffeded; border-color:#ff4949; border-radius:3px;"></label>
                                </div>
                            </div>
                        </div>
                        <div style="padding: 8px 0;">
                            <div class="g-recaptcha" data-sitekey="6LdHDRktAAAAAP4-2shYLPZMLO5J5Igjdz4Lc64E" data-callback="invisibleCaptchaCallback" data-size="invisible" onclick="executeCaptcha"></div>
                        </div>
                        <div style="padding: 8px 0;">
                            <div class="sib-form-block" style="text-align: left">
                                <button class="sib-form-block__button sib-form-block__button-with-loader" style="font-family:'Raleway', sans-serif; font-size:13px; font-weight:400; letter-spacing:2px; text-align:left; color:#FFFFFF; background-color:#000000; border-width:0px; border-radius:0px;" form="sib-form" type="submit">
                                    ANMELDEN
                                </button>
                            </div>
                        </div>
                        <input type="text" name="email_address_check" value="" class="input--hidden">
                        <input type="hidden" name="locale" value="de">
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.REQUIRED_CODE_ERROR_MESSAGE = 'Wähle bitte einen Ländervorwahl aus.';
        window.LOCALE = 'de';
        window.EMAIL_INVALID_MESSAGE = window.SMS_INVALID_MESSAGE = "Die eingegebenen Informationen sind nicht gültig. Bitte überprüfe das Feldformat und versuche es erneut.";
        window.REQUIRED_ERROR_MESSAGE = "Dieses Feld darf nicht leer sein.";
        window.GENERIC_INVALID_MESSAGE = "Die eingegebenen Informationen sind nicht gültig. Bitte überprüfe das Feldformat und versuche es erneut.";
        var AUTOHIDE = Boolean(0);

        function toggleMenu() {
            const nav = document.getElementById('navMobile');
            nav.classList.toggle('offen');
        }
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
    <script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?hl=de"></script>
</body>
</html>
