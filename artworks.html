        * {

        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .name {
            font-size: 24px;
            letter-spacing: 2px;
            text-decoration: none;
            color: black;
            font-weight: 600;
        }
        .nav-rechts {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        nav {
            display: flex;
            gap: 25px;
        }
        nav a {
            text-decoration: none;
            color: black;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: 400;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .social {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .social a {
            color: black;
            font-size: 18px;
            text-decoration: none;
        }
        .social a:hover {
            opacity: 0.6;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: black;
        }
        .nav-mobile {
            display: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px 20px 30px 20px;
            background: white;
        }
        .nav-mobile a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            letter-spacing: 1px;
            font-weight: 400;
        }
        .nav-mobile .social-mobile {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .nav-mobile .social-mobile a {
            font-size: 22px;
            color: black;
        }
        .nav-mobile.offen {
            display: flex;
        }
        .raster {
            columns: 4;
            column-gap: 8px;
            padding: 160px 190px 40px 190px;
        }
        .werk {
            break-inside: avoid;
            margin-bottom: 8px;
        }
        .werk a {
            display: block;
            text-decoration: none;
        }
        .werk img {
            width: 100%;
            height: auto;
            display: block;
        }
        .werk img:hover {
            opacity: 0.85;
            transition: opacity 0.3s ease;
        }
        @media (max-width: 1200px) {
            .raster { columns: 3; }
        }
        @media (max-width: 800px) {
            .raster { columns: 2; padding: 40px 20px 20px 20px; }
            header { padding: 20px; }
        }
        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            nav { display: none; }
            .social { display: none; }
            .hamburger { display: flex; }
        }
        @media (max-width: 500px) {
            .raster {
                columns: 1;
                column-gap: 0;
                padding: 20px;
            }
            .werk { margin-bottom: 10px; }
        }
